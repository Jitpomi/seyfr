name: Build and Release Android APK/AAB

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    name: Build & Package Android (APK + AAB)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Set up Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            aarch64-linux-android
            armv7-linux-androideabi
            x86_64-linux-android

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            core -> target

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Install jffi CLI
        run: cargo install jffi-cli

      - name: Build Android bundle (APK + AAB)
        env:
          JFFI_ANDROID_STORE_PASSWORD: ${{ secrets.JFFI_ANDROID_STORE_PASSWORD }}
          JFFI_ANDROID_KEY_PASSWORD: ${{ secrets.JFFI_ANDROID_KEY_PASSWORD }}
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          jffi bundle --platform android

      - name: Locate output APK and AAB
        id: locate
        run: |
          APK=$(find . -path "*/release/*.apk" -not -path "*/test*" | head -n 1)
          AAB=$(find . -path "*/release/*.aab" | head -n 1)
          echo "apk=$APK" >> $GITHUB_OUTPUT
          echo "aab=$AAB" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"
          echo "Found AAB: $AAB"

      - name: Rename outputs
        run: |
          cp "${{ steps.locate.outputs.apk }}" seyfr-android.apk || true
          cp "${{ steps.locate.outputs.aab }}" seyfr-android.aab || true

      - name: Create Release and Upload to Public Releases Repo
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          repository: Jitpomi/seyfr-releases
          files: |
            seyfr-android.apk
            seyfr-android.aab
          draft: false
          prerelease: false
          token: ${{ secrets.SEYFR_RELEASES_TOKEN || secrets.GITHUB_TOKEN }}
